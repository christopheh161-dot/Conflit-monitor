<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Global Conflict Monitor</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

<style>

body{
margin:0;
background:#0b0f14;
color:#d0dae5;
font-family:Arial;
}

#map{
height:100vh;
}

.panel{
position:absolute;
top:10px;
left:10px;
width:300px;
background:#111821;
border:1px solid #1f2c3a;
padding:10px;
z-index:1000;
}

.title{
color:#00d4ff;
font-weight:bold;
margin-bottom:8px;
}

.event{
font-size:12px;
border-bottom:1px solid #1f2c3a;
padding:4px;
}

.high{color:#ff4a4a;}
.medium{color:#ffa500;}
.low{color:#00ff88;}

.threatbar{
height:6px;
background:#222;
margin-top:6px;
}

.fill{
height:100%;
background:red;
width:0%;
}

.news{
position:absolute;
top:10px;
right:10px;
width:320px;
background:#111821;
border:1px solid #1f2c3a;
padding:10px;
max-height:60vh;
overflow:auto;
}

.newsitem{
font-size:12px;
border-bottom:1px solid #1f2c3a;
padding:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<div class="title">GLOBAL THREAT</div>

<div id="defcon">DEFCON 4</div>

<div class="threatbar">
<div class="fill" id="threatFill"></div>
</div>

<br>

<div class="title">EVENTS</div>
<div id="events"></div>

</div>

<div class="news">
<div class="title">LIVE NEWS</div>
<div id="newsfeed">Loading...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>

var map=L.map("map").setView([25,10],2)

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
).addTo(map)

var fireLayer=L.layerGroup().addTo(map)

var score=0

function updateThreat(){

var pct=Math.min(100,score)

document.getElementById("threatFill").style.width=pct+"%"

var d="DEFCON 4"

if(pct>50)d="DEFCON 3"
if(pct>80)d="DEFCON 2"

document.getElementById("defcon").textContent=d

}

function addEvent(text,level){

var el=document.createElement("div")

el.className="event "+level

el.textContent=text

var box=document.getElementById("events")

box.prepend(el)

if(box.children.length>20)
box.removeChild(box.lastChild)

}

function loadFires(){

fetch("https://firms.modaps.eosdis.nasa.gov/mapserver/wfs?service=WFS&request=GetFeature&typeName=firms:VIIRS_SNPP_NRT&outputFormat=application/json")

.then(r=>r.json())

.then(data=>{

fireLayer.clearLayers()

data.features.slice(0,200).forEach(f=>{

var c=f.geometry.coordinates

var lat=c[1]
var lon=c[0]

L.circleMarker([lat,lon],{
radius:3,
color:"#ff5500"
})
.addTo(fireLayer)

})

addEvent("Satellite heat anomalies updated","low")

})

}

loadFires()

setInterval(loadFires,600000)

function analyze(title){

var s=0

if(/war|guerre|attack|missile|strike/i.test(title)) s+=8
if(/military|army|troops/i.test(title)) s+=5
if(/tension|crisis/i.test(title)) s+=3

score+=s

updateThreat()

}

function addNews(title,url){

var el=document.createElement("div")

el.className="newsitem"

el.textContent=title

el.onclick=()=>window.open(url)

document.getElementById("newsfeed").prepend(el)

analyze(title)

}

function loadNews(){

var feed="https://api.allorigins.win/raw?url="+encodeURIComponent("https://feeds.bbci.co.uk/news/world/rss.xml")

fetch(feed)

.then(r=>r.text())

.then(txt=>{

var xml=new DOMParser().parseFromString(txt,"text/xml")

var items=xml.querySelectorAll("item")

document.getElementById("newsfeed").innerHTML=""

items.forEach((item,i)=>{

if(i>15)return

var title=item.querySelector("title").textContent
var link=item.querySelector("link").textContent

addNews(title,link)

})

})

}

loadNews()

setInterval(loadNews,300000)

</script>

</body>
</html>
