<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GCM — Global Conflict Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#080c10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#080c10;color:#a8b8c8;font-family:'Rajdhani',sans-serif;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.01) 2px,rgba(0,212,255,0.01) 4px);pointer-events:none;z-index:9999;}
body{display:flex;flex-direction:column;height:100vh;margin:0;}
.content{flex:1 1 auto;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.bottom-nav{display:flex;background:#0d1117;border-top:1px solid #1a2535;height:52px;flex-shrink:0;position:sticky;bottom:0;z-index:100;overflow-x:auto;}
.bottom-nav button{flex:1 1 auto;border:none;background:none;color:#a8b8c8;font-size:10px;padding:6px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;}
.bottom-nav button.active{color:#00d4ff;border-top:2px solid #00d4ff;}
.bottom-nav button .bnav-icon{font-size:18px;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:44px;background:#0d1117;border-bottom:1px solid #1a2535;flex-shrink:0;z-index:100;}
.dot{width:7px;height:7px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px #00ff88;animation:blink 1.5s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.logo{font-family:'Share Tech Mono',monospace;color:#00d4ff;font-size:13px;margin-left:6px;}
.title{font-size:11px;font-weight:700;letter-spacing:2px;color:#e0eaf4;text-transform:uppercase;}
.hright{display:flex;align-items:center;gap:8px;}
#defcon{font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;border:1px solid #ffcc00;color:#ffcc00;background:rgba(255,204,0,0.08);letter-spacing:1px;transition:all 0.5s;}
.defcon1{border-color:#ff0000!important;color:#ff0000!important;background:rgba(255,0,0,0.2)!important;animation:dp1 0.5s infinite!important;}
@keyframes dp1{0%,100%{box-shadow:0 0 15px rgba(255,0,0,0.8);}50%{box-shadow:0 0 30px rgba(255,0,0,1);}}
.defcon2{border-color:#ff2d2d!important;color:#ff2d2d!important;background:rgba(255,45,45,0.15)!important;}
.defcon3{border-color:#ff8c00!important;color:#ff8c00!important;background:rgba(255,140,0,0.1)!important;}
.defcon4{border-color:#ffcc00!important;color:#ffcc00!important;background:rgba(255,204,0,0.08)!important;}
.defcon5{border-color:#00ff88!important;color:#00ff88!important;background:rgba(0,255,136,0.08)!important;}
#clock{font-family:'Share Tech Mono',monospace;font-size:9px;color:#00d4ff;}

/* OFFLINE & ALERTS */
.offline-bar{display:none;padding:3px;background:rgba(255,140,0,0.1);border-bottom:1px solid #ff8c00;font-family:'Share Tech Mono',monospace;font-size:8px;color:#ff8c00;text-align:center;flex-shrink:0;}
.offline-bar.show{display:block;}
.defcon-alert{position:fixed;top:44px;left:0;right:0;z-index:9998;padding:8px;font-family:'Share Tech Mono',monospace;font-size:10px;text-align:center;display:none;letter-spacing:1px;}
.defcon-alert.show{display:block;animation:fadeout 4s forwards;}
@keyframes fadeout{0%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}

/* TABS */
.tab-page{display:none;flex-direction:column;overflow:hidden;flex:1;min-height:0;}
.tab-page.active{display:flex;}
#map{width:100%;flex:1;min-height:0;}
.map-controls{display:flex;gap:4px;padding:5px 6px;background:#0d1117;border-bottom:1px solid #1a2535;flex-wrap:wrap;flex-shrink:0;}
.mcbtn{padding:3px 7px;font-family:'Share Tech Mono',monospace;font-size:8px;border:1px solid #1a2535;background:#080c10;color:#a8b8c8;cursor:pointer;}
.mcbtn.active{border-color:#00d4ff;color:#00d4ff;}
.mcbtn.high{border-color:#ff2d2d;color:#ff2d2d;}
.mcbtn.medium{border-color:#ff8c00;color:#ff8c00;}
.mcbtn.low{border-color:#00ff88;color:#00ff88;}
.mcbtn.heat{border-color:#ff8c00;color:#ff8c00;}

/* LEAFLET */
.leaflet-container{background:#080c10!important;}
.leaflet-popup-content-wrapper{background:#0d1117!important;border:1px solid #00d4ff!important;border-radius:0!important;color:#e0eaf4!important;font-family:'Rajdhani',sans-serif!important;}
.leaflet-popup-tip{background:#0d1117!important;}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(255,45,45,0.2)!important;}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:rgba(255,45,45,0.5)!important;color:#fff!important;font-family:'Share Tech Mono',monospace!important;font-size:10px!important;}
</style>
</head>
<body>

<div class="offline-bar" id="offline-bar">⚠ MODE HORS LIGNE</div>
<div class="defcon-alert" id="defcon-alert"></div>

<header>
  <div style="display:flex;align-items:center;">
    <div class="dot"></div>
    <div class="logo">[GCM]</div>
    <div class="title" style="margin-left:8px;">CONFLICT MONITOR</div>
  </div>
  <div class="hright">
    <div id="defcon">DEFCON 4</div>
    <div id="clock"></div>
  </div>
</header>

<div class="content">
  <div class="tab-page active" id="map"><div id="map"></div></div>
  <div class="tab-page" id="conflicts"><div style="flex:1;background:#0a0f18;color:#fff;display:flex;align-items:center;justify-content:center;">Liste des conflits</div></div>
  <div class="tab-page" id="feed"><div style="flex:1;background:#0a0f18;color:#fff;display:flex;align-items:center;justify-content:center;">Feed en temps réel</div></div>
  <div class="tab-page" id="brief"><div style="flex:1;background:#0a0f18;color:#fff;display:flex;align-items:center;justify-content:center;">Briefing militaire</div></div>
  <div class="tab-page" id="air"><div style="flex:1;background:#0a0f18;color:#fff;display:flex;align-items:center;justify-content:center;">Données aériennes</div></div>
  <div class="tab-page" id="naval"><div style="flex:1;background:#0a0f18;color:#fff;display:flex;align-items:center;justify-content:center;">Données navales</div></div>
  <div class="tab-page" id="osint"><div style="flex:1;background:#0a0f18;color:#fff;display:flex;align-items:center;justify-content:center;">OSINT</div></div>
  <div class="tab-page" id="finance"><div style="flex:1;background:#0a0f18;color:#fff;display:flex;align-items:center;justify-content:center;">Marchés financiers</div></div>
</div>

<nav class="bottom-nav">
  <button class="bnav active" id="bnav-map" onclick="showPage('map')"><span class="bnav-icon">🗺</span>CARTE</button>
  <button class="bnav" id="bnav-conflicts" onclick="showPage('conflicts')"><span class="bnav-icon">⚔</span>CONFLITS</button>
  <button class="bnav" id="bnav-feed" onclick="showPage('feed')"><span class="bnav-icon">📡</span>FEED</button>
  <button class="bnav" id="bnav-brief" onclick="showPage('brief')"><span class="bnav-icon">📋</span>BRIEF</button>
  <button class="bnav" id="bnav-finance" onclick="showPage('finance')"><span class="bnav-icon">📈</span>MARCHÉS</button>
  <button class="bnav" id="bnav-osint" onclick="showPage('osint')"><span class="bnav-icon">🔍</span>OSINT</button>
  <button class="bnav" id="bnav-air" onclick="showPage('air')"><span class="bnav-icon">✈</span>AIR</button>
  <button class="bnav" id="bnav-naval" onclick="showPage('naval')"><span class="bnav-icon">⚓</span>NAVAL</button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<script>
// Tabs
function showPage(id){
  document.querySelectorAll('.tab-page').forEach(el=>el.classList.remove('active'));
  document.querySelector('#'+id).classList.add('active');
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('active'));
  document.querySelector('#bnav-'+id).classList.add('active');
}

// Clock
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

// DEFCON alert
function showDefcon(level){
  const defcon=document.getElementById('defcon');
  const alert=document.getElementById('defcon-alert');
  defcon.className=''; defcon.classList.add('defcon'+level);
  defcon.textContent='DEFCON '+level;
  alert.textContent='⚠ Niveau DEFCON '+level+' activé !';
  alert.classList.add('show');
  setTimeout(()=>{alert.classList.remove('show');},4000);
}

// MAP
const map=L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);

// Clusters
const markers=L.markerClusterGroup();
const sampleData=[
  {lat:48.8566,lon:2.3522,name:"Paris"},
  {lat:40.7128,lon:-74.006,name:"New York"},
  {lat:35.6895,lon:139.6917,name:"Tokyo"},
  {lat:-33.8688,lon:151.2093,name:"Sydney"}
];
sampleData.forEach(d=>markers.addLayer(L.marker([d.lat,d.lon]).bindPopup(d.name)));
map.addLayer(markers);

// Heatmap
const heatData=sampleData.map(d=>[d.lat,d.lon,0.5]);
const heat=L.heatLayer(heatData,{radius:25,blur:15,maxZoom:17});
map.addLayer(heat);

// Simuler offline
window.addEventListener('offline',()=>{document.getElementById('offline-bar').classList.add('show');});
window.addEventListener('online',()=>{document.getElementById('offline-bar').classList.remove('show');});
</script>
</body>
</html>
